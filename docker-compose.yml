version: '3.8'

services:
  # ── MySQL Database ─────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: bloodwar-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    networks:
      - bloodwar-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Backend API + WebSocket ────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bloodwar-api
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      BSC_RPC_URL: ${BSC_RPC_URL}
      BSC_WEBSOCKET_URL: ${BSC_WEBSOCKET_URL}
      FACTORY_CONTRACT_ADDRESS: ${FACTORY_CONTRACT_ADDRESS}
      DAWN_CONTRACT_ADDRESS: ${DAWN_CONTRACT_ADDRESS}
      BET_TOKEN_ADDRESS: ${BET_TOKEN_ADDRESS}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-200}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bloodwar-net

  # ── Chain Sync Worker ──────────────────────────────────────
  sync:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bloodwar-sync
    restart: always
    command: node backend/scripts/sync-chain.js
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      BSC_RPC_URL: ${BSC_RPC_URL}
      BSC_WEBSOCKET_URL: ${BSC_WEBSOCKET_URL}
      FACTORY_CONTRACT_ADDRESS: ${FACTORY_CONTRACT_ADDRESS}
      BET_TOKEN_ADDRESS: ${BET_TOKEN_ADDRESS}
      SYNC_INTERVAL_MS: ${SYNC_INTERVAL_MS:-5000}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - bloodwar-net

  # ── Nginx Reverse Proxy ────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: bloodwar-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot
    depends_on:
      - api
    networks:
      - bloodwar-net

volumes:
  mysql_data:
  certbot_webroot:

networks:
  bloodwar-net:
    driver: bridge
